# Nginx site for Eden on a single VPS, served by the `nginx` container in this stack. Compose
# mounts this file at /etc/nginx/conf.d/default.conf. Replace eden.example.com with your domain
# (README step 6). certbot (also containerized) writes ACME challenges to /var/www/certbot and
# certs to /etc/letsencrypt — both shared volumes; there is no host nginx/certbot.
#
# Two upstreams on the same host (reached over loopback thanks to host networking):
#  - Eden itself (the dashboard + API)      → 127.0.0.1:3000
#  - the environment ingress ("splitter",   → 127.0.0.1:8787
#    serves agent channel traffic at /e/<environmentId>/...)
#
# Both stream (SSE: assistant, playground, agent sessions), hence proxy_buffering off and the
# long read timeout — with buffering on, streamed tokens sit in nginx until the response ends.

# Never persist query strings or Referer values: password-reset callbacks carry a one-time token
# in the query. The Better Auth callback endpoint carries its token in the path and is disabled
# separately below. Keep this format query-free if adding fields later.
log_format eden_sanitized '$remote_addr - $remote_user [$time_local] '
                          '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                          '"$http_user_agent"';

# Port 80: serve ACME challenges over the webroot, redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name eden.example.com;
    # Override nginx.conf's inherited `main` log rather than adding a second unsafe log.
    access_log /var/log/nginx/access.log eden_sanitized;
    # Nginx error records include the raw request target. Query credentials can be nested in
    # returnTo/callback parameters on otherwise generic routes, so durable request logging lives in
    # the sanitized access log and Eden's token-redacted application log instead.
    error_log /dev/null emerg;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Better Auth puts the reset token in this path. Do not log it even for an HTTP redirect.
    location ^~ /api/auth/reset-password/ {
        access_log off;
        error_log /dev/null emerg;
        return 301 https://$host$request_uri;
    }

    location = /reset-password {
        error_log /dev/null emerg;
        return 301 https://$host$request_uri;
    }

    location = /api/auth/verify-email {
        error_log /dev/null emerg;
        return 301 https://$host$request_uri;
    }

    location ^~ /accept-invitation/ {
        access_log off;
        error_log /dev/null emerg;
        return 301 https://$host$request_uri;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name eden.example.com;
    # Override nginx.conf's inherited `main` log rather than adding a second unsafe log.
    access_log /var/log/nginx/access.log eden_sanitized;
    # See the port-80 server: nginx's raw-target error format cannot safely retain callback URLs.
    error_log /dev/null emerg;

    ssl_certificate     /etc/letsencrypt/live/eden.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eden.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Agent ingest payloads and publish requests can carry file contents.
    client_max_body_size 25m;

    # Agent channel traffic → the weighted, session-sticky splitter.
    location /e/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Everything else → Eden.
    # Better Auth puts the reset token in this callback path. It must reach Eden unchanged, but
    # must never be written to nginx's access log.
    location ^~ /api/auth/reset-password/ {
        access_log off;
        error_log /dev/null emerg;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # These callbacks carry one-time tokens in the query string. The access format omits queries;
    # suppress location-level error logging as well so an upstream outage cannot copy the URI.
    location = /reset-password {
        error_log /dev/null emerg;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location = /api/auth/verify-email {
        error_log /dev/null emerg;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Invitation IDs are mailbox capabilities. Verification is still required by Better Auth,
    # but the opaque ID has no operational value in proxy logs.
    location ^~ /accept-invitation/ {
        access_log off;
        error_log /dev/null emerg;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Overwrite, rather than append to, client-supplied IP headers. Better Auth reads this
        # single nginx-owned value for its production rate limiter.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
