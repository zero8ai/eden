name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build:
    needs: checks
    if: github.repository == 'zero8ai/eden' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    env:
      DOCKER_METADATA_SHORT_SHA_LENGTH: 7
    steps:
      - uses: actions/checkout@v4
      - id: image
        name: Select immutable image tag
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zero8ai/eden
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest
      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime
      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: build-env
          push: true
          tags: ghcr.io/zero8ai/eden:${{ steps.image.outputs.tag }}-migrate
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate

  deploy:
    needs:
      - checks
      - build
    if: github.repository == 'zero8ai/eden' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      PROD_VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
      PROD_VPS_USER: ${{ secrets.PROD_VPS_USER }}
      PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
      PROD_VPS_KNOWN_HOSTS: ${{ secrets.PROD_VPS_KNOWN_HOSTS }}
      GHCR_TOKEN: ${{ github.token }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$PROD_VPS_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          test -n "$PROD_VPS_KNOWN_HOSTS"
          printf '%s\n' "$PROD_VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/known_hosts"
          test -s "$HOME/.ssh/known_hosts"
          ssh-keygen -F "$PROD_VPS_HOST" -f "$HOME/.ssh/known_hosts" >/dev/null
      - name: Copy deployment files
        shell: bash
        run: |
          scp \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=yes \
            docker-stack.production.yml \
            deploy/production/deploy.sh \
            "${PROD_VPS_USER}@${PROD_VPS_HOST}:/opt/eden/"
      - name: Deploy immutable image
        shell: bash
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=yes \
            "${PROD_VPS_USER}@${PROD_VPS_HOST}" \
            "docker login ghcr.io --username '${{ github.actor }}' --password-stdin"
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=yes \
            "${PROD_VPS_USER}@${PROD_VPS_HOST}" \
            "chmod 700 /opt/eden/deploy.sh && IMAGE_TAG='${IMAGE_TAG}' /opt/eden/deploy.sh"
