# Nginx site for Eden on a single VPS, served by the `nginx` container in this stack. Compose
# mounts this file at /etc/nginx/conf.d/default.conf. Replace eden.example.com with your domain
# (README step 6). certbot (also containerized) writes ACME challenges to /var/www/certbot and
# certs to /etc/letsencrypt — both shared volumes; there is no host nginx/certbot.
#
# Two upstreams on the same host (reached over loopback thanks to host networking):
#  - Eden itself (the dashboard + API)      → 127.0.0.1:3000
#  - the environment ingress ("splitter",   → 127.0.0.1:8787
#    serves agent channel traffic at /e/<environmentId>/...)
#
# Both stream (SSE: assistant, playground, agent sessions), hence proxy_buffering off and the
# long read timeout — with buffering on, streamed tokens sit in nginx until the response ends.

# Port 80: serve ACME challenges over the webroot, redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name eden.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name eden.example.com;

    ssl_certificate     /etc/letsencrypt/live/eden.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eden.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Agent ingest payloads and publish requests can carry file contents.
    client_max_body_size 25m;

    # WorkOS sealed-session cookies make the post-login response header large. nginx's default
    # proxy header buffer (4k/8k) overflows → "upstream sent too big header" → 502. These govern
    # the header read even with buffering off.
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Agent channel traffic → the weighted, session-sticky splitter.
    location /e/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Everything else → Eden.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
