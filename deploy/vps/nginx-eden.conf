# Nginx site for Eden on a single VPS. Install to /etc/nginx/sites-available/eden and replace
# eden.example.com with your domain (README step 6). Certbot's nginx plugin rewrites this file
# with the TLS listener + redirect when you run it — keep this file plain HTTP until then.
#
# Two upstreams on the same host:
#  - Eden itself (the dashboard + API)      → 127.0.0.1:3000
#  - the environment ingress ("splitter",   → 127.0.0.1:8787
#    serves agent channel traffic at /e/<environmentId>/...)
#
# Both stream (SSE: assistant, playground, agent sessions), hence proxy_buffering off and the
# long read timeout — with buffering on, streamed tokens sit in nginx until the response ends.

server {
    listen 80;
    listen [::]:80;
    server_name eden.example.com;

    # Agent ingest payloads and publish requests can carry file contents.
    client_max_body_size 25m;

    # Agent channel traffic → the weighted, session-sticky splitter.
    location /e/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Everything else → Eden.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
